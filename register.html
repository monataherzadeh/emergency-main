<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="css/fonts.css">

  <link rel="icon" type="image/png" href="img/fav.png">
  <title>Emergency Site</title>

<body id="register">
  <header>
    <nav>
      <div id="logotype-wrapper" class="logo">
        <a href="index.html"> LOGO-TYPE </a>
      </div>
      <ul class="menu">
        <li><a class="menuItem" href="instruction.html">Nærkontakt</a></li>
        <li><a class="menuItem" href="register.html">Indberet</a></li>
      </ul>
      <button class="burger">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </button>
    </nav>
  </header>

  <main>
    <h1>INDBERET</h1>
    <section id="form-section">
      <article id="form-info">
        <h2>Overskrift</h2>
        <p>Tekst</p>
      </article>
      <form id="webform">

        <label for="firstname">
          <input type="text" id="firstname" />
          Navn
        </label>

        <label for="pw">
          <input type="password" id="pw" />
          Kodeord
        </label>

        <label for="num">
          <input type="number" id="num" />
          Alder
        </label>

        <label for="email">
          <input type="email" id="email" />
          E-mail</label>

        <label for="tel">
          <input type="tel" id="tel" />
          Telefon</label>

        <label for="date">
          <input type="date" id="date" />
          Fødselsdato</label>

        <fieldset>
          <legend>Hvad oplevede du?</legend>

          <label>
            <input type="checkbox" value="moon">
            Unormal måne
          </label>

          <label>
            <input type="checkbox" value="blanket">
            Svævende dyne
          </label>

          <label>
            <input type="checkbox" value="mirror">
            Mærkeligt spejl
          </label>

          <label>
            <input type="checkbox" value="shadow">
            Mystiske skygger
          </label>

        </fieldset>

        <fieldset>
          <legend>Hvor alvorligt var det?</legend>

          <label>
            <input type="radio" name="danger" value="low">
            Lav risiko
          </label>

          <label>
            <input type="radio" name="danger" value="medium">
            Middel risiko
          </label>

          <label>
            <input type="radio" name="danger" value="high">
            Høj risiko
          </label>

        </fieldset>

        <label for="time">Hvornår skete det?</label>
        <select id="time">
          <option>Aften</option>
          <option>Nat</option>
          <option>Morgen</option>
          <option>Dag</option>
        </select>

        <label for="comment">Beskriv hændelsen</label>
        <textarea id="comment" rows="5"></textarea>

        <label for="slider">Hvor mange zombier blev spottet?</label>
        <input type="range" id="slider" min="0" max="100" value="0">
        <output id="slider-value">0</output>

        <button type="submit">Indsend rapport</button>

      </form>
    </section>
    <section id="form-summary">
      <h2>Summary</h2>
      <article>
        <p class="placeholder">Opsummering</p>
      </article>
    </section>
  </main>
  <footer>

        <li><a href="#">link</a></li>
      </ul>
    </nav>
  </footer>

  <script src="js/indberet.js"></script>

</body>

</html>
