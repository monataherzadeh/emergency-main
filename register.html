  <main>
    <h1>INDBERET</h1>
    <section id="form-section">
      <article id="form-info">
        <h2>Overskrift</h2>
        <p>Tekst</p>
      </article>

      <form id="webform">
        <h3>Dine oplysninger</h3>

        <label>
          Dit navn
          <input type="text" id="firstname" />
        </label>

        <label>
          Email
          <input type="email" id="email" />
        </label>

        <label>
          Telefon
          <input type="tel" id="tel" />
        </label>

        <h3>Hændelsen</h3>

        <label>
          Dato
          <input type="date" id="date" />
        </label>

        <label>
          Tidspunkt
          <select id="time">
            <option>Aften</option>
            <option>Nat</option>
            <option>Morgen</option>
            <option>Dag</option>
          </select>
        </label>

        <label for="comment">Beskriv hændelsen</label>
        <textarea id="comment" rows="5"></textarea>

        <button type="submit">Indsend rapport</button>
      </form>
    </section>

    <section id="form-summary">
      <h2>Summary</h2>
      <article>
        <p class="placeholder">Opsummering</p>
      </article>
    </section>
